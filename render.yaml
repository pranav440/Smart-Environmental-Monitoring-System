services:
  - type: web
    name: smart-environmental-monitoring-system
    runtime: java
    buildCommand: "./mvnw clean install -DskipTests"
    startCommand: "java -jar smart-environment-monitor/target/smart-environmental-monitor-2.0.0.jar"
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: WEATHER_API_KEY
        sync: false # Set this in Render Dashboard UI for security
      - key: PORT
        value: 8080
