server.port=${PORT:8080}
spring.application.name=smart-environmental-monitoring-system

# Database Configuration (Dynamic for Production)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:environmental_db;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.driverClassName=${JDBC_DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}

# H2 Console (Enabled for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Schema initialization
spring.sql.init.mode=always

# Logging
logging.level.com.environmental=INFO
logging.level.org.springframework.jdbc=WARN

# OpenWeatherMap API Configuration
# Set this as an Environment Variable named WEATHER_API_KEY
weather.api.key=${WEATHER_API_KEY:REPLACEME}

# Data refresh interval in milliseconds (default 5 minutes)
data.refresh.interval=300000

# Cache TTL in milliseconds (default 5 minutes)
cache.ttl=300000