server.port=8080
spring.application.name=smart-environmental-monitor

# Database Configuration (H2 In-Memory - Hassle Free)
spring.datasource.url=jdbc:h2:mem:environmental_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Enabled for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Schema initialization
spring.sql.init.mode=always

# Logging
logging.level.com.environmental=INFO
logging.level.org.springframework.jdbc=WARN

# OpenWeatherMap API Configuration
# Set this as an Environment Variable named WEATHER_API_KEY
weather.api.key=${WEATHER_API_KEY:REPLACEME}

# Data refresh interval in milliseconds (default 5 minutes)
data.refresh.interval=300000

# Cache TTL in milliseconds (default 5 minutes)
cache.ttl=300000